<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revival TVPass - HLS Engine</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background-color: #0f0f12;
      color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      .screen-bug {
  position: absolute;
  top: 20px;
  right: 20px;
  background-color: rgba(0, 0, 0, 0.4); /* Semi-transparent black background */
  color: rgba(255, 255, 255, 0.6);      /* Semi-transparent white text */
  padding: 6px 12px;
  border-radius: 6px;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 0.85rem;
  font-weight: bold;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  pointer-events: none;                  /* CRITICAL: Lets you click "through" it to use player controls */
  z-index: 10;                           /* Forces it to sit on top of the video frame */
  user-select: none;
}
    {
    .back-btn {
      align-self: flex-start;
      color: #3b82f6;
      text-decoration: none;
      font-weight: bold;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .player-container {
      width: 100%;
      max-width: 960px;
      background-color: #000;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #27273a;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }
    video {
      width: 100%;
      height: auto;
      display: block;
    }
    .stream-info {
      width: 100%;
      max-width: 940px;
      margin-top: 20px;
    }
    h2 { margin: 0 0 6px 0; color: #fff; }
    p { margin: 0; color: #9ca3af; font-family: monospace; font-size: 0.85rem; word-break: break-all; }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Feed Guide</a>

  <div class="player-container">
    <div class="player-container" style="position: relative;">
  <video id="video-engine" controls autoplay playsinline></video>

  <div class="screen-bug">
    <i class="fa-solid fa-tv" style="font-size: 0.9rem; margin-right: 4px;"></i> 
    tvpass.org
  </div>
</div>
    <video id="video-engine" controls autoplay playsinline></video>
  </div>

  <div class="stream-info">
    <h2 id="channel-title">Live Pipeline</h2>
    <p id="channel-desc">Initializing decoder stream engine...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8/dist/hls.min.js"></script>
  
  <script>
    const params = new URLSearchParams(window.location.search);
    const targetStream = params.get('stream');
    const targetTitle = params.get('title');

    if (targetStream) {
      document.getElementById('channel-title').innerText = targetTitle || "Live Feed";
      document.getElementById('channel-desc').innerText = `Source: ${targetStream}`;

      const video = document.getElementById('video-engine');

      // 1. If the browser supports HLS natively (like Safari on iPhones)
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = targetStream;
      } 
      // 2. For modern browsers without native support (Xbox Edge, Chrome, Firefox)
      else if (Hls.isSupported()) {
        
        // Optimizing engine configs specifically for a console environment
        const hls = new Hls({
          maxBufferSize: 8 * 1024 * 1024, // Keeps RAM cache under 8MB so the console browser doesn't freeze
          maxBufferLength: 15,            // Limits ahead buffering to 15 seconds max
          lowLatencyMode: true,           // Ensures high-speed sync for live tracks
          enableWorker: true              // Offloads decoding onto a separate CPU thread
        });

        hls.loadSource(targetStream);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function() {
          video.play().catch(e => console.log("Autoplay blocked, waiting for click interaction."));
        });

        // Error Recovery Engine Layer
        hls.on(Hls.Events.ERROR, function (event, data) {
          if (data.fatal) {
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                console.log("Fatal network error encountered, attempting pipeline reset...");
                hls.startLoad();
                break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                console.log("Fatal media decoding glitch, forcing stall recovery...");
                hls.recoverMediaError();
                break;
              default:
                console.log("Unrecoverable error state reached.");
                break;
            }
          }
        });

      } else {
        document.getElementById('channel-title').innerText = "Streaming Unresolvable";
        document.getElementById('channel-desc').innerText = "Your browser architecture lacks Media Source Extensions (MSE).";
      }
    } else {
      document.getElementById('channel-title').innerText = "No stream parameters targeted.";
    }
  </script>
</body>
</html>
