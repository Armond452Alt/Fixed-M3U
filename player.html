<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Revival TVPass Player</title>
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  <link href="https://unpkg.com/@videojs/themes@1.0.1/forest/index.css" rel="stylesheet">
</head>
<body style="background: #111; margin: 0; padding: 0;">

  <div style="width: 80%; margin: 50px auto;">
    <video
      id="tvpass-player"
      class="video-js vjs-big-play-centered vjs-theme-forest"
      controls
      preload="auto"
      width="1024"
      height="576"
      data-setup='{}'>
      
      <source src="https://revival.tvpass.org/api/stream.mp4?channel=nicktoons&token=USER_SESSION_KEY" type="application/x-mpegURL">
      
      <p class="vjs-no-js">
        To view this video please enable JavaScript, and consider upgrading to a web browser that
        <a href="https://videojs.com/html5-video-support/" target="_blank">supports HTML5 video</a>
      </p>
    </video>
  </div>

  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
</body>
</html>
