<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revival TVPass - Player Engine</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
  
  <style>
    body {
      background-color: #0f0f12;
      color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .back-btn {
      align-self: flex-start;
      color: #3b82f6;
      text-decoration: none;
      font-weight: bold;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .player-container {
      width: 100%;
      max-width: 960px;
      background-color: #000;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #27273a;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
      position: relative;
    }
    
    /* Premium Player Look & Sizing */
    .video-js {
      width: 100%;
      aspect-ratio: 16/9;
    }
    .stream-info {
      width: 100%;
      max-width: 940px;
      margin-top: 20px;
    }
    h2 { margin: 0 0 6px 0; color: #fff; }
    p { margin: 0; color: #9ca3af; font-family: monospace; font-size: 0.85rem; word-break: break-all; }
    
    /* Custom TVPass Screen Bug Watermark */
    .screen-bug {
      position: absolute;
      top: 25px;
      right: 25px;
      pointer-events: none; 
      z-index: 10;          
      user-select: none;
    }
    .screen-bug img {
      height: 35px;         
      width: auto;
      opacity: 0.45;        
      display: block;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Feed Guide</a>

  <div class="player-container">
    <video id="tvpass-engine" class="video-js vjs-default-skin" controls autoplay preload="auto" playsinline></video>

    <div class="screen-bug">
      <img src="https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/414ef987-7ebb-45f1-a5d4-a9417121856d/djlsw10-5249177b-9e6f-488e-953a-12027b5ad518.png?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7InBhdGgiOiIvZi80MTRlZjk4Ny03ZWJiLTQ1ZjEtYTVkNC1hOTQxNzEyMTg1NmQvZGpsc3cxMC01MjQ5MTc3Yi05ZTZmLTQ4OGUtOTUzYS0xMjAyN2I1YWQ1MTgucG5nIn1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmZpbGUuZG93bmxvYWQiXX0.ty-UcWiL7cbB5a8TGCVw17wpcqbW53AKElLOJ89KME8" alt="TVPass Bug">
    </div>
  </div>

  <div class="stream-info">
    <h2 id="channel-title">Live Pipeline</h2>
    <p id="channel-desc">Initializing video components...</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const targetStream = params.get('stream');
    const targetTitle = params.get('title');

    if (targetStream) {
      document.getElementById('channel-title').innerText = targetTitle || "Live Feed";
      document.getElementById('channel-desc').innerText = `Source: ${targetStream}`;

      // Initialize Video.js with our customized buffering to stop the Xbox tearing glitch
      const player = videojs('tvpass-engine', {
        html5: {
          vhs: {
            overrideNative: true,
            maxBufferSize: 15 * 1024 * 1024, // 15MB cushion pool
            smoothQualityChange: true,
            fastStart: false
          }
        }
      });

      // Load stream parameter
      player.src({
        src: targetStream,
        type: 'application/x-mpegURL'
      });

      player.ready(function() {
        player.play().catch(e => console.log("Autoplay paused waiting for interaction."));
      });

    } else {
      document.getElementById('channel-title').innerText = "No stream parameters targeted.";
    }
  </script>
</body>
</html>
