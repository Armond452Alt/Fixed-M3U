<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TVPass - Channel Guide</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-main: #0a0a0c;
      --bg-surface: #121216;
      --bg-card: #1c1c24;
      --accent: #3b82f6;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      background-color: var(--bg-surface);
      padding: 25px 0;
      text-align: center;
      border-bottom: 1px solid #27273a;
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 1px;
      color: #fff;
    }

    header p {
      margin: 6px 0 0 0;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .main-container {
      width: 100%;
      max-width: 1000px;
      padding: 30px 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .grid-title {
      font-size: 1.25rem;
      margin: 0;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Channel Grid Assembly */
    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
    }

    /* Clickable Link Cards for Xbox Browser Navigation */
    .channel-link {
      text-decoration: none;
      color: inherit;
      outline: none;
    }

    .channel-card {
      background-color: var(--bg-card);
      border: 1px solid #2d2d3d;
      border-radius: 12px;
      padding: 25px 20px;
      text-align: center;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    /* Visual cues when navigating with an Xbox Controller */
    .channel-link:hover .channel-card,
    .channel-link:focus .channel-card {
      border-color: var(--accent);
      background-color: #242430;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.2);
    }

    .channel-icon {
      font-size: 2.2rem;
      color: var(--accent);
    }

    .channel-name {
      font-weight: 600;
      font-size: 1.05rem;
      color: #fff;
    }
  </style>
</head>
<body>

  <header>
    <h1>TVPass Control Guide</h1>
    <p>Select a transmission line to launch the dedicated player screen</p>
  </header>

  <div class="main-container">
    
    <h3 class="grid-title"><i class="fa-solid fa-satellite-dish"></i> Active Pipeline Stations</h3>

    <!-- The Grid Deck -->
    <div class="channel-grid" id="station-deck">
      <!-- Generated automatically via the data script below -->
    </div>

  </div>

  <script>
    // 1. Centralized Streaming Data Bank
    // Update or add your specific live .m3u8 source URLs right inside this list!
    const channels = [
      { 
        name: "Cartoon Network", 
        icon: "fa-tv", 
        url: "https://your-stream-provider.com/live/cartoon_network.m3u8" 
      },
      { 
        name: "Adult Swim", 
        icon: "fa-moon", 
        url: "https://your-stream-provider.com/live/adult_swim.m3u8" 
      },
      { 
        name: "Nickelodeon", 
        icon: "fa-circle-dot", 
        url: "https://your-stream-provider.com/live/nickelodeon.m3u8" 
      },
      { 
        name: "Nicktoons", 
        icon: "fa-bolt", 
        url: "https://your-stream-provider.com/live/nicktoons.m3u8" 
      }
    ];

    const deckElement = document.getElementById('station-deck');

    // 2. Loop through and create links that send parameters safely to player.html
    channels.forEach(chan => {
      // Safely encode strings for URL parameter transmission
      const encodedUrl = encodeURIComponent(chan.url);
      const encodedTitle = encodeURIComponent(chan.name);
      
      const anchor = document.createElement('a');
      anchor.className = 'channel-link';
      // Automatically target player.html with our data parameters attached
      anchor.href = `player.html?stream=${encodedUrl}&title=${encodedTitle}`;

      anchor.innerHTML = `
        <div class="channel-card">
          <i class="fa-solid ${chan.icon} channel-icon"></i>
          <div class="channel-name">${chan.name}</div>
        </div>
      `;

      deckElement.appendChild(anchor);
    });
  </script>
</body>
</html>
