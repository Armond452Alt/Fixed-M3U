<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TVPass - Channel Guide</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-main: #0a0a0c;
      --bg-surface: #121216;
      --bg-card: #1c1c24;
      --accent: #3b82f6;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      background-color: var(--bg-surface);
      padding: 25px 0;
      text-align: center;
      border-bottom: 1px solid #27273a;
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 1px;
      color: #fff;
    }

    header p {
      margin: 6px 0 0 0;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .main-container {
      width: 100%;
      max-width: 1000px;
      padding: 30px 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .grid-title {
      font-size: 1.25rem;
      margin: 0;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
    }

    .channel-link {
      text-decoration: none;
      color: inherit;
      outline: none;
    }

    .channel-card {
      background-color: var(--bg-card);
      border: 1px solid #2d2d3d;
      border-radius: 12px;
      padding: 25px 20px;
      text-align: center;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      height: 100%;
      box-sizing: border-box;
    }

    .channel-link:hover .channel-card,
    .channel-link:focus .channel-card {
      border-color: var(--accent);
      background-color: #242430;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.2);
    }

    .channel-icon {
      font-size: 2.2rem;
      color: var(--accent);
    }

    .channel-name {
      font-weight: 600;
      font-size: 1.05rem;
      color: #fff;
    }

    .status-msg {
      color: var(--text-muted);
      font-style: italic;
    }
  </style>
</head>
<body>

  <header>
    <h1>TVPass Control Guide</h1>
    <p>Select a transmission line to launch the dedicated player screen</p>
  </header>

  <div class="main-container">
    
    <h3 class="grid-title"><i class="fa-solid fa-satellite-dish"></i> Active Pipeline Stations</h3>

    <div class="channel-grid" id="station-deck">
      <p class="status-msg" id="loading-text">Parsing CN/AS.m3u transmission matrix...</p>
    </div>

  </div>

  <script>
    const deckElement = document.getElementById('station-deck');
    const loadingText = document.getElementById('loading-text');

    // Automatically assigns a clean icon based on keywords in the channel name
    function getIcon(name) {
      const lower = name.toLowerCase();
      if (lower.includes('adult swim') || lower.includes('swim')) return 'fa-moon';
      if (lower.includes('cartoon') || lower.includes('cn')) return 'fa-tv';
      if (lower.includes('toons') || lower.includes('bolt')) return 'fa-bolt';
      return 'fa-circle-dot'; // Default fallback icon
    }

    // Read and parse the local CN/AS.m3u playlist file directly
    fetch('CN/AS.m3u')
      .then(response => {
        if (!response.ok) throw new Error('Could not load playlist file.');
        return response.text();
      })
      .then(data => {
        // Clear loading message
        deckElement.innerHTML = '';

        const lines = data.split('\n');
        let currentName = '';

        lines.forEach(line => {
          line = line.trim();

          // Look for the metadata info line (#EXTINF)
          if (line.startsWith('#EXTINF:')) {
            // Pull the channel name after the last comma
            const commaIndex = line.lastIndexOf(',');
            if (commaIndex !== -1) {
              currentName = line.substring(commaIndex + 1).trim();
            }
          } 
          // If the line is an active HTTP stream link and we have a name ready
          else if (line.startsWith('http') && currentName) {
            const streamUrl = line;
            
            // Encode parameters securely for player.html handoff
            const encodedUrl = encodeURIComponent(streamUrl);
            const encodedTitle = encodeURIComponent(currentName);
            const iconClass = getIcon(currentName);

            const anchor = document.createElement('a');
            anchor.className = 'channel-link';
            anchor.href = `player.html?stream=${encodedUrl}&title=${encodedTitle}`;

            anchor.innerHTML = `
              <div class="channel-card">
                <i class="fa-solid ${iconClass} channel-icon"></i>
                <div class="channel-name">${currentName}</div>
              </div>
            `;

            deckElement.appendChild(anchor);
            
            // Reset tracker for the next item loop
            currentName = '';
          }
        });

        if (deckElement.children.length === 0) {
          deckElement.innerHTML = '<p class="status-msg">No active streaming lines parsed out of CN/AS.m3u.</p>';
        }
      })
      .catch(err => {
        console.error(err);
        loadingText.innerText = "Error reading tracking stream: Make sure 'CN/AS.m3u' matches your file path path exactly.";
      });
  </script>
</body>
</html>
